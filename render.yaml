services:
  - type: web
    name: neurommentor-api-khaivan2210
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - fromGroup: neurommentor-email
      - key: DATABASE_URL
        fromDatabase:
          name: neurommentor-postgres-khaivan2210
          property: connectionString
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: APP_PUBLIC_URL
        value: https://neuro-mentor-ai.vercel.app/
      - key: CORS_ALLOWED_ORIGINS
        value: https://neuro-mentor-ai.vercel.app
      - key: CORS_ORIGIN_REGEX
        value: ^https://neuro-mentor-ai(?:-[a-z0-9-]+)?\.vercel\.app$
      - key: EMAIL_REMINDER_SCHEDULER_ENABLED
        value: "false"
      - key: EMAIL_REMINDER_POLL_SECONDS
        value: "60"

  - type: cron
    name: neurommentor-reminders-khaivan2210
    runtime: python
    rootDir: backend
    plan: starter
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m app.jobs.send_email_reminders
    autoDeployTrigger: commit
    envVars:
      - fromGroup: neurommentor-email
      - key: DATABASE_URL
        fromDatabase:
          name: neurommentor-postgres-khaivan2210
          property: connectionString
      - key: AUTO_CREATE_TABLES
        value: "false"

databases:
  - name: neurommentor-postgres-khaivan2210
    plan: basic-256mb
    databaseName: neurommentor
    user: neurommentor
    postgresMajorVersion: "16"
    ipAllowList: []

envVarGroups:
  - name: neurommentor-email
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: APP_PUBLIC_URL
        value: https://neuro-mentor-ai.vercel.app/
